# Sparkbot — Local / Desktop Deployment
#
# No domain, no SSL, no Traefik. Runs fully on localhost.
# Works on Windows (Docker Desktop), macOS, Linux.
#
# Quick start:
#   bash scripts/sparkbot-start.sh
#
# Web UI:  http://localhost:${SPARKBOT_FRONTEND_PORT:-3000}
# API:     http://localhost:8000
# API docs: http://localhost:8000/docs
#
# To stop:
#   docker compose -f compose.local.yml down
#
# To wipe all data (database, uploads):
#   docker compose -f compose.local.yml down -v

services:

  db:
    image: postgres:18
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparkbot -d sparkbot"]
      interval: 5s
      retries: 10
      start_period: 10s
      timeout: 5s
    volumes:
      - sparkbot-local-db:/var/lib/postgresql/data/pgdata
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run scripts/sparkbot-start.sh or set POSTGRES_PASSWORD in .env}
      POSTGRES_USER: sparkbot
      POSTGRES_DB: sparkbot

  prestart:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    command: bash scripts/prestart.sh
    env_file:
      - .env.local
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=sparkbot
      - POSTGRES_USER=sparkbot
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Run scripts/sparkbot-start.sh or set POSTGRES_PASSWORD in .env}
      - ENVIRONMENT=local
      - DATABASE_TYPE=postgresql
      - FIRST_SUPERUSER=${FIRST_SUPERUSER:-admin@example.com}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD:-changeme}
      - BACKEND_CORS_ORIGINS=http://localhost:${SPARKBOT_FRONTEND_PORT:-3000},http://127.0.0.1:${SPARKBOT_FRONTEND_PORT:-3000},http://localhost:5173,http://127.0.0.1:5173

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    extra_hosts:
      # Lets the backend container reach Ollama running on the host machine.
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    env_file:
      - .env.local
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=sparkbot
      - POSTGRES_USER=sparkbot
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Run scripts/sparkbot-start.sh or set POSTGRES_PASSWORD in .env}
      - ENVIRONMENT=local
      - DOMAIN=localhost
      - FRONTEND_HOST=http://localhost:${SPARKBOT_FRONTEND_PORT:-3000}
      - BACKEND_CORS_ORIGINS=http://localhost:${SPARKBOT_FRONTEND_PORT:-3000},http://127.0.0.1:${SPARKBOT_FRONTEND_PORT:-3000},http://localhost:5173,http://127.0.0.1:5173
      - DATABASE_TYPE=postgresql
      - FIRST_SUPERUSER=${FIRST_SUPERUSER:-admin@example.com}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD:-changeme}
      # Persist saved API keys and runtime .env to the data volume so they survive container restarts
      - SPARKBOT_DATA_DIR=/app/backend/data
      - SPARKBOT_GUARDIAN_DATA_DIR=/app/backend/data/guardian
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - sparkbot-local-uploads:/app/backend/uploads
      - sparkbot-local-data:/app/backend/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
        - NODE_ENV=production
        - VITE_V1_LOCAL_MODE=${VITE_V1_LOCAL_MODE:-false}
    restart: unless-stopped
    ports:
      - "${SPARKBOT_FRONTEND_BIND_HOST:-127.0.0.1}:${SPARKBOT_FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  sparkbot-local-db:
  sparkbot-local-uploads:
  sparkbot-local-data:

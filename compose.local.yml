# Sparkbot — Local / Desktop Deployment
#
# No domain, no SSL, no Traefik. Runs fully on localhost.
# Works on Windows (Docker Desktop), macOS, Linux.
#
# Quick start:
#   cp .env.example .env.local          # then add your API keys
#   docker compose -f compose.local.yml up --build
#
# Web UI:  http://localhost:3000
# API:     http://localhost:8000
# API docs: http://localhost:8000/docs
#
# To stop:
#   docker compose -f compose.local.yml down
#
# To wipe all data (database, uploads):
#   docker compose -f compose.local.yml down -v

services:

  db:
    image: postgres:18
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sparkbot -d sparkbot"]
      interval: 5s
      retries: 10
      start_period: 10s
      timeout: 5s
    volumes:
      - sparkbot-local-db:/var/lib/postgresql/data/pgdata
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_PASSWORD: sparkbot-local
      POSTGRES_USER: sparkbot
      POSTGRES_DB: sparkbot

  prestart:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    command: bash scripts/prestart.sh
    env_file:
      - path: .env.local
        required: false
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=sparkbot
      - POSTGRES_USER=sparkbot
      - POSTGRES_PASSWORD=sparkbot-local
      - ENVIRONMENT=local
      - PROJECT_NAME=${PROJECT_NAME:-Sparkbot}
      - SECRET_KEY=${SECRET_KEY:-please-change-this-secret-key-min-32}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER:-admin@example.com}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD:-changeme}
      - BACKEND_CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      prestart:
        condition: service_completed_successfully
    env_file:
      - path: .env.local
        required: false
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=sparkbot
      - POSTGRES_USER=sparkbot
      - POSTGRES_PASSWORD=sparkbot-local
      - ENVIRONMENT=local
      - DOMAIN=localhost
      - FRONTEND_HOST=http://localhost:3000
      - BACKEND_CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000
      - PROJECT_NAME=${PROJECT_NAME:-Sparkbot}
      - SECRET_KEY=${SECRET_KEY:-please-change-this-secret-key-min-32}
      - FIRST_SUPERUSER=${FIRST_SUPERUSER:-admin@example.com}
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD:-changeme}
      - SPARKBOT_PASSPHRASE=${SPARKBOT_PASSPHRASE:-sparkbot-local}
      # LLM keys — set in .env.local or export before running
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      # Optional bridges
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_ENABLED=${DISCORD_ENABLED:-false}
      # Guardian policy mode: false = personal (no gates), true = office/team (full enforcement)
      - SPARKBOT_GUARDIAN_POLICY_ENABLED=${SPARKBOT_GUARDIAN_POLICY_ENABLED:-false}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - sparkbot-local-uploads:/app/backend/uploads
      - sparkbot-local-data:/app/backend/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
        - NODE_ENV=production
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend

volumes:
  sparkbot-local-db:
  sparkbot-local-uploads:
  sparkbot-local-data:

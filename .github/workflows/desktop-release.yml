name: Desktop Release

# Triggered by a tag push matching desktop-v* (e.g. desktop-v1.3.0).
# Produces: Windows NSIS, macOS DMG (Intel + Apple Silicon), Linux AppImage.
#
# ─── Code signing ────────────────────────────────────────────────────────────
# Windows — SignPath Foundation (free for open source, signpath.org):
#   Set these GitHub Actions secrets to enable automatic signing:
#     SIGNPATH_API_TOKEN     API token from your SignPath organization
#     SIGNPATH_ORG_ID        Your SignPath organization ID
#     SIGNPATH_PROJECT_SLUG  SignPath project slug for Sparkbot
#     SIGNPATH_SIGNING_POLICY_SLUG  SignPath signing policy slug
#     SIGNPATH_ARTIFACT_CONFIGURATION_SLUG  Optional artifact configuration slug
#   Signing is skipped automatically when secrets are absent (dev/fork builds).
#
# macOS — Apple Developer Program ($99/yr, developer.apple.com):
#   APPLE_CERTIFICATE           base64-encoded Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD  password for the .p12
#   APPLE_SIGNING_IDENTITY      "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                    Apple ID email used for notarization
#   APPLE_PASSWORD              app-specific password from appleid.apple.com
#   APPLE_TEAM_ID               10-character Team ID from developer.apple.com
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to build (e.g. desktop-v1.5.0)"
        required: true
        default: "desktop-v1.5.0"

jobs:
  # ─────────────────────────── Windows (NSIS) ────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
    outputs:
      windows_signed: ${{ steps.prepare-windows-release.outputs.signed }}
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORG_ID: ${{ secrets.SIGNPATH_ORG_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ secrets.SIGNPATH_PROJECT_SLUG }}
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ secrets.SIGNPATH_SIGNING_POLICY_SLUG }}
      SIGNPATH_ARTIFACT_CONFIGURATION_SLUG: ${{ secrets.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Inject version from tag into tauri.conf.json
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#desktop-v}"
          python3 -c "import json,pathlib; p=pathlib.Path('src-tauri/tauri.conf.json'); c=json.loads(p.read_text()); c['version']='$VERSION'; p.write_text(json.dumps(c,indent=2)+'\n'); print('Version set to $VERSION')"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Tauri CLI binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-${{ runner.arch }}-tauri-cli-2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI v2 (pre-compiled binary)
        run: cargo binstall tauri-cli --version "^2" --no-confirm --force

      - name: Install Bun workspace deps
        run: bun install

      - name: Sync backend Python deps (release only — no dev group)
        working-directory: backend
        run: uv sync

      - name: Build PyInstaller backend sidecar
        shell: bash
        run: |
          cd backend
          uv run python -m PyInstaller \
            --distpath ../src-tauri/binaries \
            --noconfirm \
            ../sparkbot-backend.spec

      - name: Rename sidecar for Tauri target triple
        shell: pwsh
        run: |
          Move-Item `
            src-tauri\binaries\sparkbot-backend.exe `
            src-tauri\binaries\sparkbot-backend-x86_64-pc-windows-msvc.exe
          Write-Host "Sidecar renamed OK."

      - name: Build frontend (V1 local mode)
        shell: bash
        run: node scripts/run-desktop-frontend.mjs build

      - name: Build Tauri installer (NSIS)
        shell: bash
        run: cargo tauri build --config src-tauri/tauri.conf.json --bundles nsis

      - name: Upload unsigned Windows installer
        id: upload-unsigned-windows-installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows-unsigned
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7

      - name: Submit Windows installer to SignPath
        id: sign-windows-installer-default-config
        if: ${{ env.SIGNPATH_API_TOKEN != '' && env.SIGNPATH_ORG_ID != '' && env.SIGNPATH_PROJECT_SLUG != '' && env.SIGNPATH_SIGNING_POLICY_SLUG != '' && env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG == '' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORG_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-windows-installer.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: signed-windows
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parameters: |
            version: "${{ github.event.inputs.tag_name || github.ref_name }}"

      - name: Submit Windows installer to SignPath (custom artifact config)
        id: sign-windows-installer-custom-config
        if: ${{ env.SIGNPATH_API_TOKEN != '' && env.SIGNPATH_ORG_ID != '' && env.SIGNPATH_PROJECT_SLUG != '' && env.SIGNPATH_SIGNING_POLICY_SLUG != '' && env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG != '' }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ env.SIGNPATH_API_TOKEN }}
          organization-id: ${{ env.SIGNPATH_ORG_ID }}
          project-slug: ${{ env.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: ${{ env.SIGNPATH_ARTIFACT_CONFIGURATION_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-windows-installer.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 1800
          output-artifact-directory: signed-windows
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parameters: |
            version: "${{ github.event.inputs.tag_name || github.ref_name }}"

      - name: Prepare Windows release artifact
        id: prepare-windows-release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-windows | Out-Null

          $signedInstaller = Get-ChildItem signed-windows -Recurse -Filter *.exe -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like "*-setup.exe" } |
            Select-Object -First 1

          if ($signedInstaller) {
            Copy-Item $signedInstaller.FullName release-windows\
            "signed=true" >> $env:GITHUB_OUTPUT
            Write-Host "Using signed Windows installer: $($signedInstaller.Name)"
            exit 0
          }

          $unsignedInstaller = Get-ChildItem src-tauri\target\release\bundle\nsis\*.exe | Select-Object -First 1
          if (-not $unsignedInstaller) {
            Write-Error "No Windows installer found."
            exit 1
          }

          Copy-Item $unsignedInstaller.FullName release-windows\
          "signed=false" >> $env:GITHUB_OUTPUT
          Write-Host "Using unsigned Windows installer: $($unsignedInstaller.Name)"

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          path: release-windows/*.exe
          if-no-files-found: error
          retention-days: 7

  # ──────────────── macOS Apple Silicon (DMG, aarch64) ───────────────────────
  # Note: GitHub retired the macos-13 (Intel) hosted runner. The ARM DMG below
  # works on all Macs including Intel ones via Rosetta 2.
  # macos-latest = M-series runner. PyInstaller produces aarch64 binary natively.
  build-macos-arm:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Inject version from tag into tauri.conf.json
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#desktop-v}"
          python3 -c "import json,pathlib; p=pathlib.Path('src-tauri/tauri.conf.json'); c=json.loads(p.read_text()); c['version']='$VERSION'; p.write_text(json.dumps(c,indent=2)+'\n'); print('Version set to $VERSION')"

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust (stable, Apple Silicon target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-arm64-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-arm64-cargo-

      - name: Cache Tauri CLI binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-aarch64-tauri-cli-2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI v2 (pre-compiled binary)
        run: cargo binstall tauri-cli --version "^2" --no-confirm --force

      - name: Install Bun workspace deps
        run: bun install

      - name: Sync backend Python deps (release only — no dev group)
        working-directory: backend
        run: uv sync

      - name: Build PyInstaller backend sidecar (aarch64)
        run: |
          cd backend
          uv run python -m PyInstaller \
            --distpath ../src-tauri/binaries \
            --noconfirm \
            ../sparkbot-backend.spec

      - name: Rename sidecar for Tauri target triple
        run: |
          mv src-tauri/binaries/sparkbot-backend \
             src-tauri/binaries/sparkbot-backend-aarch64-apple-darwin

      - name: Build frontend (V1 local mode)
        run: node scripts/run-desktop-frontend.mjs build

      - name: Build Tauri installer (DMG, Apple Silicon)
        run: cargo tauri build --config src-tauri/tauri.conf.json --bundles dmg --target aarch64-apple-darwin
        # macOS signing: add APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
        # APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID env vars here (from GitHub secrets) to enable
        # signing + notarization. Omit them entirely (not just empty) to produce unsigned DMGs.

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos-arm
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  # ─────────────────────────── Linux (AppImage) ──────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Inject version from tag into tauri.conf.json
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#desktop-v}"
          python3 -c "import json,pathlib; p=pathlib.Path('src-tauri/tauri.conf.json'); c=json.loads(p.read_text()); c['version']='$VERSION'; p.write_text(json.dumps(c,indent=2)+'\n'); print('Version set to $VERSION')"

      - name: Install system deps for Tauri (GTK, WebKit, AppImage)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Tauri CLI binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-${{ runner.arch }}-tauri-cli-2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI v2 (pre-compiled binary)
        run: cargo binstall tauri-cli --version "^2" --no-confirm --force

      - name: Install Bun workspace deps
        run: bun install

      - name: Sync backend Python deps (release only — no dev group)
        working-directory: backend
        run: uv sync

      - name: Build PyInstaller backend sidecar
        run: |
          cd backend
          uv run python -m PyInstaller \
            --distpath ../src-tauri/binaries \
            --noconfirm \
            ../sparkbot-backend.spec

      - name: Rename sidecar for Tauri target triple
        run: |
          mv src-tauri/binaries/sparkbot-backend \
             src-tauri/binaries/sparkbot-backend-x86_64-unknown-linux-gnu

      - name: Build frontend (V1 local mode)
        run: node scripts/run-desktop-frontend.mjs build

      - name: Build Tauri installer (AppImage)
        run: cargo tauri build --config src-tauri/tauri.conf.json --bundles appimage

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 7

  # ──────────── GitHub Release (all 4 installers) ────────────────────────────
  release:
    needs: [build-windows, build-macos-arm, build-linux]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Windows release artifact
        uses: actions/download-artifact@v4
        with:
          name: installer-windows
          path: dist/
          merge-multiple: true

      - name: Download macOS release artifact
        uses: actions/download-artifact@v4
        with:
          name: installer-macos-arm
          path: dist/
          merge-multiple: true

      - name: Download Linux release artifact
        uses: actions/download-artifact@v4
        with:
          name: installer-linux
          path: dist/
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: List release files
        run: ls -lh dist/

      - name: Generate release notes
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}
          WINDOWS_SIGNED: ${{ needs.build-windows.outputs.windows_signed }}
        run: |
          if [ "$WINDOWS_SIGNED" = "true" ]; then
            WINDOWS_INSTALL_NOTE='**Windows:** Download `*-setup.exe` and run it.'
            WINDOWS_SIGNING_NOTE='> The Windows installer is Authenticode-signed through SignPath Foundation.'
            TRUST_NOTE='> Windows is signed for this release. macOS is still unsigned unless Apple signing and notarization secrets are configured.'
          else
            WINDOWS_INSTALL_NOTE='**Windows:** Download `*-setup.exe` and run it.'
            WINDOWS_SIGNING_NOTE='> SmartScreen may show "Windows protected your PC". Click **More info -> Run anyway**. This warning appears because the installer is not Authenticode-signed yet.'
            TRUST_NOTE='> Windows signing was not configured for this build, so SmartScreen may require an extra click. macOS is still unsigned unless Apple signing and notarization secrets are configured.'
          fi

          cat > release-notes.md <<EOF
          ## Sparkbot Desktop ${RELEASE_TAG}

          Double-click installer — **no Docker, no terminal, no prerequisites**.

          ### Downloads

          | Platform | File | Notes |
          |----------|------|-------|
          | Windows 10+ | \`*-setup.exe\` | NSIS installer |
          | macOS (Apple Silicon + Intel via Rosetta 2) | \`*-aarch64.dmg\` | Drag to Applications |
          | Linux x86-64 | \`*.AppImage\` | \`chmod +x\`, then run |

          ### Install

          ${WINDOWS_INSTALL_NOTE}
          ${WINDOWS_SIGNING_NOTE}

          **macOS:** Download the \`.dmg\`, open it, drag Sparkbot Local to Applications, then launch. Works on Apple Silicon natively and Intel Macs via Rosetta 2.
          > Gatekeeper may say "Apple cannot verify this app". Right-click the app in Applications -> **Open**, then click **Open** in the dialog. You only need to do this once.

          **Linux:** Download the \`.AppImage\`, make it executable (\`chmod +x *.AppImage\`), then run it.

          ${TRUST_NOTE}

          ### Verify checksums

          \`\`\`
          sha256sum --check SHA256SUMS
          # macOS:
          shasum -a 256 -c SHA256SUMS
          # Windows (PowerShell):
          Get-FileHash .\Sparkbot.Local_*_x64-setup.exe -Algorithm SHA256
          \`\`\`

          ### First launch

          Sparkbot Controls opens on first launch for provider and model setup.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: "Sparkbot Desktop ${{ github.event.inputs.tag_name || github.ref_name }}"
          draft: false
          prerelease: false
          files: dist/*
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

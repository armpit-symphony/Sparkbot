name: Desktop Release

# Triggered by a tag push matching desktop-v* (e.g. desktop-v1.3.0).
# Produces: Windows NSIS, macOS DMG (Intel + Apple Silicon), Linux AppImage.
#
# ─── Code signing ────────────────────────────────────────────────────────────
# Windows — SignPath Foundation (free for open source, signpath.org):
#   Set these GitHub Actions secrets to enable automatic signing:
#     SIGNPATH_API_TOKEN     API token from your SignPath organization
#     SIGNPATH_ORG_ID        Your SignPath organization ID
#   Signing is skipped automatically when secrets are absent (dev/fork builds).
#
# macOS — Apple Developer Program ($99/yr, developer.apple.com):
#   APPLE_CERTIFICATE           base64-encoded Developer ID Application .p12
#   APPLE_CERTIFICATE_PASSWORD  password for the .p12
#   APPLE_SIGNING_IDENTITY      "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                    Apple ID email used for notarization
#   APPLE_PASSWORD              app-specific password from appleid.apple.com
#   APPLE_TEAM_ID               10-character Team ID from developer.apple.com
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    tags:
      - "desktop-v*"

jobs:
  # ─────────────────────────── Windows (NSIS) ────────────────────────────────
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Tauri CLI binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-${{ runner.arch }}-tauri-cli-2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI v2 (pre-compiled binary)
        run: cargo binstall tauri-cli --version "^2" --no-confirm

      - name: Install Bun workspace deps
        run: bun install

      - name: Sync backend Python deps (release only — no dev group)
        working-directory: backend
        run: uv sync

      - name: Build PyInstaller backend sidecar
        shell: bash
        run: |
          cd backend
          uv run python -m PyInstaller \
            --distpath ../src-tauri/binaries \
            --noconfirm \
            ../sparkbot-backend.spec

      - name: Rename sidecar for Tauri target triple
        shell: pwsh
        run: |
          Move-Item `
            src-tauri\binaries\sparkbot-backend.exe `
            src-tauri\binaries\sparkbot-backend-x86_64-pc-windows-msvc.exe
          Write-Host "Sidecar renamed OK."

      # ── Sign the backend sidecar BEFORE it goes into the installer ──────────
      - name: Upload unsigned sidecar for signing
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        id: upload-sidecar
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-sidecar-windows
          path: src-tauri/binaries/sparkbot-backend-x86_64-pc-windows-msvc.exe
          retention-days: 1

      - name: Sign backend sidecar (SignPath Foundation)
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORG_ID }}'
          project-slug: 'sparkbot'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'windows-sidecar'
          github-artifact-id: '${{ steps.upload-sidecar.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: src-tauri/binaries/
      # ────────────────────────────────────────────────────────────────────────

      - name: Build frontend (V1 local mode)
        shell: bash
        run: node scripts/run-desktop-frontend.mjs build

      - name: Build Tauri installer (NSIS)
        shell: bash
        run: cargo tauri build --config src-tauri/tauri.conf.json --bundles nsis

      # ── Sign the NSIS installer ──────────────────────────────────────────────
      - name: Upload unsigned installer for signing
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        id: upload-installer-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 1

      - name: Sign NSIS installer (SignPath Foundation)
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '${{ secrets.SIGNPATH_ORG_ID }}'
          project-slug: 'sparkbot'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'windows-installer'
          github-artifact-id: '${{ steps.upload-installer-unsigned.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: signed-installer/
      # ────────────────────────────────────────────────────────────────────────

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows
          # Use signed installer if signing ran, otherwise use unsigned build output
          path: |
            signed-installer/*.exe
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 7

  # ──────────────────── macOS Intel (DMG, x86_64) ────────────────────────────
  # macos-13 = Intel runner. PyInstaller produces x86_64 binary natively here.
  # Do NOT use macos-latest for this job — it is M-series and would produce
  # an arm64 sidecar even when cross-compiling the Tauri shell to x86_64.
  build-macos-intel:
    runs-on: macos-13
    continue-on-error: true  # macos-13 runner unavailable on free plans; skip without blocking release
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust (stable, Intel target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-x86-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-x86-cargo-

      - name: Cache Tauri CLI binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-x86_64-tauri-cli-2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI v2 (pre-compiled binary)
        run: cargo binstall tauri-cli --version "^2" --no-confirm

      - name: Install Bun workspace deps
        run: bun install

      - name: Sync backend Python deps (release only — no dev group)
        working-directory: backend
        run: uv sync

      - name: Build PyInstaller backend sidecar (x86_64)
        run: |
          cd backend
          uv run python -m PyInstaller \
            --distpath ../src-tauri/binaries \
            --noconfirm \
            ../sparkbot-backend.spec

      - name: Rename sidecar for Tauri target triple
        run: |
          mv src-tauri/binaries/sparkbot-backend \
             src-tauri/binaries/sparkbot-backend-x86_64-apple-darwin

      - name: Build frontend (V1 local mode)
        run: node scripts/run-desktop-frontend.mjs build

      - name: Build Tauri installer (DMG, Intel)
        run: cargo tauri build --config src-tauri/tauri.conf.json --bundles dmg --target x86_64-apple-darwin
        # macOS signing: add APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
        # APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID env vars here (from GitHub secrets) to enable
        # signing + notarization. Omit them entirely (not just empty) to produce unsigned DMGs.

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos-intel
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  # ──────────────── macOS Apple Silicon (DMG, aarch64) ───────────────────────
  # macos-latest = M-series runner. PyInstaller produces aarch64 binary natively.
  build-macos-arm:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust (stable, Apple Silicon target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-arm64-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-arm64-cargo-

      - name: Cache Tauri CLI binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-aarch64-tauri-cli-2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI v2 (pre-compiled binary)
        run: cargo binstall tauri-cli --version "^2" --no-confirm

      - name: Install Bun workspace deps
        run: bun install

      - name: Sync backend Python deps (release only — no dev group)
        working-directory: backend
        run: uv sync

      - name: Build PyInstaller backend sidecar (aarch64)
        run: |
          cd backend
          uv run python -m PyInstaller \
            --distpath ../src-tauri/binaries \
            --noconfirm \
            ../sparkbot-backend.spec

      - name: Rename sidecar for Tauri target triple
        run: |
          mv src-tauri/binaries/sparkbot-backend \
             src-tauri/binaries/sparkbot-backend-aarch64-apple-darwin

      - name: Build frontend (V1 local mode)
        run: node scripts/run-desktop-frontend.mjs build

      - name: Build Tauri installer (DMG, Apple Silicon)
        run: cargo tauri build --config src-tauri/tauri.conf.json --bundles dmg --target aarch64-apple-darwin
        # macOS signing: add APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
        # APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID env vars here (from GitHub secrets) to enable
        # signing + notarization. Omit them entirely (not just empty) to produce unsigned DMGs.

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos-arm
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          if-no-files-found: error
          retention-days: 7

  # ─────────────────────────── Linux (AppImage) ──────────────────────────────
  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system deps for Tauri (GTK, WebKit, AppImage)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cache Tauri CLI binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: cargo-bin-${{ runner.os }}-${{ runner.arch }}-tauri-cli-2

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Tauri CLI v2 (pre-compiled binary)
        run: cargo binstall tauri-cli --version "^2" --no-confirm

      - name: Install Bun workspace deps
        run: bun install

      - name: Sync backend Python deps (release only — no dev group)
        working-directory: backend
        run: uv sync

      - name: Build PyInstaller backend sidecar
        run: |
          cd backend
          uv run python -m PyInstaller \
            --distpath ../src-tauri/binaries \
            --noconfirm \
            ../sparkbot-backend.spec

      - name: Rename sidecar for Tauri target triple
        run: |
          mv src-tauri/binaries/sparkbot-backend \
             src-tauri/binaries/sparkbot-backend-x86_64-unknown-linux-gnu

      - name: Build frontend (V1 local mode)
        run: node scripts/run-desktop-frontend.mjs build

      - name: Build Tauri installer (AppImage)
        run: cargo tauri build --config src-tauri/tauri.conf.json --bundles appimage

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 7

  # ──────────── GitHub Release (all 4 installers) ────────────────────────────
  release:
    needs: [build-windows, build-macos-arm, build-linux]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate SHA256 checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: List release files
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Sparkbot Desktop ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: dist/*
          body: |
            ## Sparkbot Desktop ${{ github.ref_name }}

            Double-click installer — **no Docker, no terminal, no prerequisites**.

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows 10+ | `*-setup.exe` | NSIS installer |
            | macOS Intel (x86_64) | `*-x86_64.dmg` | Drag to Applications |
            | macOS Apple Silicon (M1/M2/M3) | `*-aarch64.dmg` | Drag to Applications |
            | Linux x86-64 | `*.AppImage` | `chmod +x`, then run |

            ### Install

            **Windows:** Download `*-setup.exe` and run it.
            > SmartScreen may show "Windows protected your PC". Click **More info → Run anyway**. This warning appears because the installer is not yet Authenticode-signed.

            **macOS:** Download the `.dmg` for your chip (Intel or Apple Silicon — check  → About This Mac), open it, drag Sparkbot Local to Applications, then launch.
            > Gatekeeper may say "Apple cannot verify this app". Right-click the app in Applications → **Open**, then click **Open** in the dialog. You only need to do this once.

            **Linux:** Download the `.AppImage`, make it executable (`chmod +x *.AppImage`), then run it.

            > These installers are **not yet code-signed**. macOS and Windows show one-time security prompts that require an extra click. Signed builds will eliminate this warning in a future release.

            ### Verify checksums

            ```
            sha256sum --check SHA256SUMS
            # macOS:
            shasum -a 256 -c SHA256SUMS
            ```

            ### First launch

            Sparkbot Controls opens on first launch for provider and model setup.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

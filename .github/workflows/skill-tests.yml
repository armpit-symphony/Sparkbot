name: Skill Tests

on:
  push:
    branches: [main]
    paths:
      - "backend/skills/**"
      - "backend/app/services/skills.py"
      - "backend/app/services/skill_executor.py"
      - "backend/app/services/guardian/policy.py"
      - ".github/workflows/skill-tests.yml"
  pull_request:
    paths:
      - "backend/skills/**"
      - "backend/app/services/skills.py"
      - "backend/app/services/skill_executor.py"
      - "backend/app/services/guardian/policy.py"

jobs:
  skill-smoke-tests:
    name: Skill interface validation
    runs-on: ubuntu-latest

    env:
      DATABASE_TYPE: sqlite
      V1_LOCAL_MODE: "true"
      ENVIRONMENT: local
      PROJECT_NAME: Sparkbot
      SECRET_KEY: test-secret-key-for-ci
      FIRST_SUPERUSER: admin@example.com
      FIRST_SUPERUSER_PASSWORD: sparkbot-local
      SPARKBOT_PASSPHRASE: sparkbot-local
      BACKEND_CORS_ORIGINS: "http://localhost:3000"
      WORKSTATION_LIVE_TERMINAL_ENABLED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        working-directory: backend
        run: uv sync --group dev

      - name: Run skill smoke tests
        working-directory: backend
        run: uv run python -m pytest tests/test_skills.py -v --tb=short

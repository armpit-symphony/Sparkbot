name: Build Windows Installer (Manual QA)

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Version tag to inject into the Windows QA build (e.g. desktop-v1.6.0)"
        required: true
        default: "desktop-v1.6.0"

jobs:
  build-windows-installer:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject version from tag into tauri.conf.json
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          VERSION="${TAG#desktop-v}"
          python3 -c "import json,pathlib; p=pathlib.Path('src-tauri/tauri.conf.json'); c=json.loads(p.read_text()); c['version']='$VERSION'; p.write_text(json.dumps(c,indent=2)+'\n'); print('Version set to $VERSION')"

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Rust (stable, Windows target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Tauri CLI v2
        run: cargo install tauri-cli --version "^2"

      - name: Install Bun workspace deps
        run: bun install

      # ── Backend sidecar (PyInstaller) ──────────────────────────────────────

      - name: Sync backend Python deps (uv)
        working-directory: backend
        run: uv sync --group dev

      - name: Build PyInstaller backend sidecar
        shell: bash
        run: |
          cd backend
          uv run python -m PyInstaller \
            --distpath ../src-tauri/binaries \
            --noconfirm \
            ../sparkbot-backend.spec

      - name: Rename sidecar for Tauri target triple
        shell: pwsh
        run: |
          Move-Item `
            src-tauri\binaries\sparkbot-backend.exe `
            src-tauri\binaries\sparkbot-backend-x86_64-pc-windows-msvc.exe
          Write-Host "Sidecar renamed OK."

      # ── Frontend (Vite, V1 local mode) ────────────────────────────────────

      - name: Build frontend (V1 local mode)
        shell: bash
        run: node scripts/run-desktop-frontend.mjs build

      # ── Tauri NSIS installer ───────────────────────────────────────────────

      - name: Build Tauri installer (NSIS)
        shell: bash
        run: cargo tauri build --config src-tauri/tauri.conf.json --bundles nsis
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # ── Collect and upload artifacts ───────────────────────────────────────

      - name: Find installer path
        id: artifact
        shell: bash
        run: |
          EXE=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          if [ -z "$EXE" ]; then
            echo "ERROR: no .exe found in bundle/nsis"
            find src-tauri/target/release/bundle -type f | head -20
            exit 1
          fi
          echo "exe=$EXE" >> "$GITHUB_OUTPUT"
          echo "Found installer: $EXE ($(du -h "$EXE" | cut -f1))"

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sparkbot-Windows-Installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: QA workflow notice
        shell: bash
        run: |
          echo "Built an unsigned Windows QA installer for ${{ github.event.inputs.tag_name }}."
          echo "Use .github/workflows/desktop-release.yml for public GitHub Releases."

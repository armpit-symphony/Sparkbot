<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 178 36" width="178" height="36" role="img" aria-label="SparkBot">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff7a18"/>
      <stop offset="0.55" stop-color="#af62ff"/>
      <stop offset="1" stop-color="#18d6ff"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon: rounded square background -->
  <rect x="1" y="1" width="34" height="34" rx="8" fill="rgba(0,0,0,0.06)" stroke="rgba(0,0,0,0.12)"/>
  <!-- Spark/flame shape -->
  <path filter="url(#soft)" d="M18 5.5c1.5 3.1 1.9 5.5 1.1 7.7-0.9 2.5-3.2 4-5.6 5 1.7 0.4 3.9 1.3 5 3.1 1.7 2.5 1.1 5.9-1.5 8.6 4.1-1.1 7.7-4 9.4-7.7 1.5-3.3 1.7-6.9 0-10.5-1.3-3.1-4.1-5.1-8.4-6.2z" fill="url(#g)"/>
  <!-- SP text inside icon -->
  <text x="18" y="25.5" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Arial" font-weight="800" font-size="8.5" fill="white" letter-spacing="0.4">SP</text>
  <!-- SparkBot wordmark text (dark for light bg) -->
  <text x="46" y="24.5" font-family="Inter, system-ui, -apple-system, Arial" font-weight="700" font-size="16" fill="rgba(15,15,15,0.9)" letter-spacing="-0.4">SparkBot</text>
</svg>
